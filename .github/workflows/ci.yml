name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest pytest-asyncio httpx uuid6

    - name: Run Linting (Ruff)
      run: ruff check .
    
    - name: Create .env file
      run: cp .env.example .env
      
    - name: Set up Docker Compose
      run: docker compose up -d
      
    - name: Wait for services to be healthy
      run: |
        echo "Waiting for all services to be healthy..."
        for i in {1..30}; do
          # Get State and Health for all containers
          DATA=$(docker compose ps --format json | jq -c 'if type == "array" then .[] else . end | select(type=="object") | {Name: .Name, State: .State, Health: (.Health // "none")}')
          
          # 1. Check for reboot loops
          RESTARTING=$(echo "$DATA" | jq -r 'select(.State == "restarting") | .Name')
          if [ -n "$RESTARTING" ]; then
            echo "CRITICAL: Some services are RESTARTING (possible crash): $RESTARTING"
            docker compose logs $RESTARTING
            sleep 5
            continue
          fi
          
          # 2. Check for unhealthy or starting services
          UNHEALTHY=$(echo "$DATA" | jq -r 'select(.Health == "unhealthy") | .Name')
          STARTING=$(echo "$DATA" | jq -r 'select(.Health == "starting") | .Name')
          
          if [ -n "$UNHEALTHY" ] || [ -n "$STARTING" ]; then
            echo "Waiting for services to stabilize..."
            [ -n "$UNHEALTHY" ] && echo "Unhealthy: $UNHEALTHY"
            [ -n "$STARTING" ] && echo "Starting: $STARTING"
            sleep 5
            continue
          fi

          # 3. Final check: ensure we actually have healthy services
          if echo "$DATA" | jq -e 'select(.Health == "healthy")' > /dev/null; then
            echo "All critical services are healthy and stable!"
            docker compose ps
            exit 0
          fi
          
          echo "Waiting for initial health reports..."
          sleep 5
        done
        echo "Error: Services did not become healthy in time."
        docker compose ps
        docker compose logs
        exit 1
      
    - name: Run All Tests
      run: pytest tests/
        
    - name: Print Container Logs on Failure
      if: failure()
      run: docker compose logs
      
    - name: Tear down
      if: always()
      run: docker compose down
