name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest pytest-asyncio httpx uuid6

    - name: Run Linting (Ruff)
      run: ruff check .
    
    - name: Create .env file
      run: cp .env.example .env
      
    - name: Set up Docker Compose
      run: docker compose up -d
      
    - name: Wait for services to be healthy
      run: |
        echo "Waiting for all services to be healthy..."
        for i in {1..30}; do
          # Robustly extract health status. Handles both array and NDJSON formats.
          STATUSES=$(docker compose ps --format json | jq -r 'if type == "array" then .[] else . end | select(type == "object") | .Health // "none"')
          
          if [ -z "$STATUSES" ]; then
            echo "Waiting for containers to appear..."
            sleep 5
            continue
          fi

          if echo "$STATUSES" | grep -qvE "healthy|none"; then
            echo "Some services are still starting or unhealthy: $(echo "$STATUSES" | tr '\n' ' ')"
            sleep 5
          else
            # Check if we actually have services that should be healthy
            if echo "$STATUSES" | grep -q "healthy"; then
               echo "All critical services are healthy!"
               docker compose ps
               exit 0
            fi
            echo "Waiting for health status to appear..."
            sleep 5
          fi
        done
        echo "Error: Services did not become healthy in time."
        docker compose ps
        docker compose logs
        exit 1
      
    - name: Run All Tests
      run: pytest tests/
        
    - name: Print Container Logs on Failure
      if: failure()
      run: docker compose logs
      
    - name: Tear down
      if: always()
      run: docker compose down
